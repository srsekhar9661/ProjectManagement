<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Project Management{% endblock %}</title>

  <!-- Bootstrap CSS (use same major version as JS) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
    -webkit-user-select: none; /* Safari */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE 10+ */
    user-select: none;         /* Standard syntax */
  }

    /* make toggler icon white on dark bg (custom) */
    .navbar-toggler {
      border-color: rgba(255,255,255,0.6);
    }
    .navbar-dark .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,0.9)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }
  </style>
</head>
<body>

  <!-- Use the navbar component and add navbar-expand-lg so it expands on large screens -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Project management Tool</a>

      <!-- toggler (type="button" recommended) -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
              aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- this will be visible on large screens and collapsed on small screens because of navbar-expand-lg -->
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav ms-auto"> <!-- ms-auto pushes links to the right -->
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="{% url 'core:home' %}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Features</a>
          </li>
          {% comment %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'core:pricing_page' %}">Pricing</a>
          </li>
          {% endcomment %}
          {% if request.user.is_authenticated %}
            <li class="nav-item">
                <a href="{% url 'core:logout' %}" class="nav-link">Logout</a>
            </li>
          {% else %}
            <li class="nav-item">
                <a href="{% url 'core:signup' %}" class="nav-link">Signup</a>
            </li>
            <li class="nav-item">
                <a href="{% url 'core:login' %}" class="nav-link">Login</a>
            </li>
          {% endif %}
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="navDropdown" role="button" data-bs-toggle="dropdown">
              More
            </a>
            <ul class="dropdown-menu dropdown-menu-end" >
              <li><a class="dropdown-item" href="{% url 'core:dashboard_page' %}">Dashboard</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <!-- Bootstrap JS bundle (same major version) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
